<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowchart Editor</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="script.js" defer></script>
  <style>
    /* Hamburger menu styles */
    .hamburger-menu {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 200;
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: var(--control-bg);
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      pointer-events: all;
    }

    .hamburger-menu span {
      display: block;
      width: 25px;
      height: 3px;
      background: var(--text);
      border-radius: 2px;
      transition: 0.3s;
    }

    .hamburger-menu.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .hamburger-menu.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger-menu.active span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    .hamburger-dropdown {
      position: absolute;
      top: 60px;
      left: 15px;
      background: var(--popup-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 0;
      z-index: 201;
      display: none;
      flex-direction: column;
      min-width: 180px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      pointer-events: all;
    }

    .hamburger-dropdown.open {
      display: flex;
    }

    .hamburger-dropdown .menu-item {
      padding: 10px 20px;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
      border: none;
      background: transparent;
      text-align: left;
      width: 100%;
      white-space: nowrap;
    }

    .hamburger-dropdown .menu-item:hover {
      background: var(--control-hover);
    }

    .hamburger-dropdown .menu-item:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .hamburger-dropdown .menu-item.disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .hamburger-menu {
        display: flex;
      }

      .zoom-controls {
        top: 15px;
        right: 15px;
        flex-direction: row;
        gap: 6px;
      }

      .reset-view-controls .desktop-controls {
        display: none !important;
      }

      .reset-view-controls {
        position: static;
        width: 100vw;
        align-items: stretch;
        margin: 0;
        right: 0;
        bottom: 0;
      }

      .reset-view-controls>div {
        flex-direction: column !important;
        gap: 6px !important;
        width: 100%;
      }

      #connection-controls-row {
        width: 100% !important;
        justify-content: stretch !important;
        padding: 0 10px;
        box-sizing: border-box;
      }

      #connection-controls {
        flex-direction: column !important;
        gap: 6px !important;
        width: 100%;
      }

      .reset-view-btn,
      #connection-controls button {
        width: 100% !important;
        min-width: 0 !important;
        font-size: 15px !important;
        margin-top: 0 !important;
        box-sizing: border-box;
      }

      #flowchart {
        position: fixed !important;
        inset: 0 !important;
        height: 100vh !important;
        min-height: 400px !important;
        width: 100vw !important;
        min-width: 0 !important;
        display: block !important;
        background: var(--panel-bg) !important;
        overflow: auto !important;
      }

      /* Other mobile styles from original CSS */
      #export-popup,
      #import-popup {
        min-width: 95vw !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        padding: 10px 4vw !important;
      }

      #export-textarea,
      #import-textarea {
        font-size: 13px !important;
        width: 100% !important;
        min-width: 0 !important;
      }

      #node-edit-popup {
        min-width: 90vw !important;
        max-width: 95vw !important;
        width: 95vw !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        padding: 10px 8px !important;
        bottom: 60px !important;
      }

      #node-edit-input {
        font-size: 15px !important;
      }

      #storage-popup {
        min-width: 95vw !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        padding: 12px 4vw !important;
        max-height: 80vh !important;
      }

      #storage-slots {
        max-height: 50vh !important;
      }

      .storage-slot {
        flex-wrap: wrap !important;
        gap: 4px !important;
      }

      .storage-slot button {
        font-size: 12px !important;
        padding: 4px 8px !important;
      }

      #node-action-btns {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 6px !important;
        justify-content: center !important;
      }

      #node-action-btns button {
        flex: 0 1 auto !important;
        min-width: 0 !important;
        font-size: 13px !important;
        padding: 6px 12px !important;
        white-space: nowrap !important;
      }

      #node-sibling-btns {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 6px !important;
        justify-content: center !important;
      }

      #node-sibling-btns button {
        flex: 0 1 auto !important;
        min-width: 0 !important;
        font-size: 13px !important;
        padding: 6px 12px !important;
        white-space: nowrap !important;
      }

      #node-move-btns {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 6px !important;
        justify-content: center !important;
      }

      #node-move-btns button {
        flex: 0 1 auto !important;
        min-width: 0 !important;
        font-size: 13px !important;
        padding: 6px 12px !important;
        white-space: nowrap !important;
      }

      #node-color-btns {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 6px !important;
        justify-content: center !important;
      }

      #node-color-btns button {
        flex: 0 1 auto !important;
        min-width: 0 !important;
        font-size: 12px !important;
        padding: 4px 10px !important;
        white-space: nowrap !important;
      }

      #export-popup div:last-child button,
      #import-popup div:last-child button {
        font-size: 14px !important;
        padding: 6px 12px !important;
      }

      html,
      body,
      .container,
      .flowchart-panel {
        position: fixed !important;
        inset: 0 !important;
        height: 100vh !important;
        min-height: 100vh !important;
        width: 100vw !important;
        min-width: 0 !important;
        overflow: auto !important;
        background: var(--bg) !important;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="flowchart-panel" id="flowchart-panel">
      <div id="flowchart"></div>

      <!-- Hamburger Menu (visible on mobile) -->
      <div class="hamburger-menu" id="hamburger-menu" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- Hamburger Dropdown -->
      <div class="hamburger-dropdown" id="hamburger-dropdown">
        <button class="menu-item" id="hamburger-undo">↩ Undo</button>
        <button class="menu-item" id="hamburger-redo">↪ Redo</button>
        <button class="menu-item" id="hamburger-reset-view">⟲ Reset View</button>
        <button class="menu-item" id="hamburger-export">⬇ Export All</button>
        <button class="menu-item" id="hamburger-import">⬆ Import All</button>
        <button class="menu-item" id="hamburger-open">📂 Open</button>
      </div>

      <div class="zoom-controls">
        <div class="zoom-btn" id="zoom-in">+</div>
        <div class="zoom-btn" id="zoom-out">-</div>
        <div class="zoom-btn" id="reset-zoom">↻</div>
      </div>

      <div class="reset-view-controls">
        <div style="display: flex; flex-direction: column; gap: 4px;">
          <!-- Desktop controls (hidden on mobile) -->
          <div class="desktop-controls" style="display: flex; gap: 8px; flex-wrap: wrap;">
            <div class="reset-view-btn" id="undo-btn">Undo</div>
            <div class="reset-view-btn" id="redo-btn">Redo</div>
            <div class="reset-view-btn" id="reset-view">Reset View</div>
            <div class="reset-view-btn" id="export-btn">Export All</div>
            <div class="reset-view-btn" id="import-btn">Import All</div>
            <div class="reset-view-btn" id="open-btn">Open</div>
          </div>

          <!-- Move connection controls row -->
          <div id="connection-controls-row"
            style="display:none; width:100%; justify-content:flex-start; margin-bottom:4px;">
            <div id="connection-controls" style="display:flex; gap: 4px;">
              <button id="move-connection-left" class="reset-view-btn" style="width:auto; margin-top:0;">&larr; Move
                Left</button>
              <button id="move-connection-right" class="reset-view-btn" style="width:auto; margin-top:0;">Move Right
                &rarr;</button>
              <button id="delete-connection-btn" class="reset-view-btn"
                style="width:auto; background:#ffe0e0; border-color:#ffaaaa; color:#a00;">Delete
                Connector</button>
            </div>
          </div>

          <!-- Node delete button row -->
          <div id="node-controls-row" style="display:none; width:100%; justify-content:flex-end; margin-top:4px;">
            <!-- Delete Node button removed -->
          </div>
        </div>
      </div>
    </div>

    <!-- Node text edit popup -->
    <div id="node-edit-popup"
      style="display:none; position:absolute; left:50%; bottom:80px; transform:translateX(-50%); background:white; border:1px solid #ccc; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,0.15); padding:16px 24px; z-index:3000; font-size:16px; min-width:260px;">
      <form id="node-edit-form" style="display:flex; gap:10px; align-items:center;">
        <input id="node-edit-input" type="text"
          style="flex:1; font-size:16px; padding:4px 8px; border-radius:4px; border:1px solid #aaa;">
      </form>
    </div>

    <!-- Export popup -->
    <div id="export-popup"
      style="display:none; position:absolute; left:50%; top:80px; transform:translateX(-50%); background:white; border:1px solid #ccc; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,0.15); padding:16px 24px; z-index:3000; font-size:16px; min-width:340px;">
      <div style="margin-bottom:8px; font-weight:bold;">Exported Flowcharts</div>
      <textarea id="export-textarea"
        style="width:100%; height:300px; font-size:14px; border-radius:4px; border:1px solid #aaa; resize:vertical;"
        readonly></textarea>
      <div style="display:flex; justify-content:flex-end; margin-top:10px;">
        <button id="close-export-btn"
          style="font-size:15px; padding:6px 18px; border:1px solid #aaa; border-radius:5px; background:#f8f8f8; cursor:pointer;">Close</button>
      </div>
    </div>

    <!-- Import popup -->
    <div id="import-popup"
      style="display:none; position:absolute; left:50%; top:80px; transform:translateX(-50%); background:white; border:1px solid #ccc; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,0.15); padding:16px 24px; z-index:3000; font-size:16px; min-width:340px;">
      <div style="margin-bottom:8px; font-weight:bold;">Import Flowcharts (JSON)</div>
      <textarea id="import-textarea"
        style="width:100%; height:200px; font-size:14px; border-radius:4px; border:1px solid #aaa; resize:vertical;"></textarea>
      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:10px;">
        <button id="import-confirm-btn"
          style="font-size:15px; padding:6px 18px; border:1px solid #aaa; border-radius:5px; background:#e0ffe0; cursor:pointer;">Import</button>
        <button id="close-import-btn"
          style="font-size:15px; padding:6px 18px; border:1px solid #aaa; border-radius:5px; background:#f8f8f8; cursor:pointer;">Cancel</button>
      </div>
    </div>

    <!-- Storage popup -->
    <div id="storage-popup">
      <div style="margin-bottom:8px; font-weight:bold;">Saved Flowcharts</div>
      <div style="margin-bottom:12px;">
        <button id="new-flowchart-btn" style="padding:8px 16px; background:#00a67e; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">
          + New Flowchart
        </button>
      </div>
      <div id="storage-slots"></div>
      <div style="display:flex; justify-content:flex-end; margin-top:10px;">
        <button id="close-storage-btn"
          style="font-size:15px; padding:6px 18px; border:1px solid #aaa; border-radius:5px; background:#f8f8f8; cursor:pointer;">Close</button>
      </div>
    </div>
  </div>

  <script>
    // Hamburger menu toggle
    document.addEventListener('DOMContentLoaded', function() {
      const hamburgerBtn = document.getElementById('hamburger-menu');
      const dropdown = document.getElementById('hamburger-dropdown');

      // Toggle dropdown on hamburger click
      hamburgerBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        this.classList.toggle('active');
        dropdown.classList.toggle('open');
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', function(e) {
        if (!hamburgerBtn.contains(e.target) && !dropdown.contains(e.target)) {
          hamburgerBtn.classList.remove('active');
          dropdown.classList.remove('open');
        }
      });

      // Map hamburger menu items to their corresponding buttons
      const mappings = {
        'hamburger-undo': 'undo-btn',
        'hamburger-redo': 'redo-btn',
        'hamburger-reset-view': 'reset-view',
        'hamburger-export': 'export-btn',
        'hamburger-import': 'import-btn',
        'hamburger-open': 'open-btn'
      };

      // For each hamburger item, find the original button and trigger click
      Object.keys(mappings).forEach(hamburgerId => {
        const menuItem = document.getElementById(hamburgerId);
        const targetId = mappings[hamburgerId];
        const targetBtn = document.getElementById(targetId);

        if (menuItem && targetBtn) {
          menuItem.addEventListener('click', function(e) {
            e.stopPropagation();
            targetBtn.click();
            // Close the dropdown after action
            hamburgerBtn.classList.remove('active');
            dropdown.classList.remove('open');
          });
        }
      });

      // Keep undo/redo button states in sync with the hamburger menu items
      const undoBtn = document.getElementById('undo-btn');
      const redoBtn = document.getElementById('redo-btn');
      const hamburgerUndo = document.getElementById('hamburger-undo');
      const hamburgerRedo = document.getElementById('hamburger-redo');

      function updateHamburgerStates() {
        if (undoBtn && hamburgerUndo) {
          const isDisabled = undoBtn.style.opacity === '0.5' || undoBtn.style.pointerEvents === 'none';
          hamburgerUndo.classList.toggle('disabled', isDisabled);
        }
        if (redoBtn && hamburgerRedo) {
          const isDisabled = redoBtn.style.opacity === '0.5' || redoBtn.style.pointerEvents === 'none';
          hamburgerRedo.classList.toggle('disabled', isDisabled);
        }
      }

      // Observe changes to undo/redo buttons
      if (undoBtn && redoBtn) {
        const observer = new MutationObserver(updateHamburgerStates);
        observer.observe(undoBtn, { attributes: true, attributeFilter: ['style'] });
        observer.observe(redoBtn, { attributes: true, attributeFilter: ['style'] });
        // Initial update
        setTimeout(updateHamburgerStates, 100);
      }
    });
  </script>
</body>

</html>
